<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mink Mascot Slideshow</title>
<style>
  /* Container holding the slideshow */
  .slideshow-container {
    max-width: 800px;
    position: relative;
    margin: auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  /* Hide all slides by default */
  .slide {
    display: none;
  }

  /* Next & previous buttons */
  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    margin-top: -40px;
    padding: 16px;
    color: rgb(114, 180, 45);
    font-weight: bold;
    font-size: 18px;
    transition: 0.6s ease;
    border-radius: 0 3px 3px 0;
    user-select: none;
    background-color: rgba(0,0,0,0.4);
    text-decoration: none;
  }

  /* Position the "next button" to the right */
  .next {
    right: 0;
    border-radius: 3px 0 0 3px;
  }

  /* On hover, add a darker background color */
  .prev:hover, .next:hover {
    background-color: rgba(0,0,0,0.8);
  }

  /* Fading animation */
  .fade {
    animation-name: fade;
    animation-duration: 1.5s;
  }

  @keyframes fade {
    from {opacity: .4} 
    to {opacity: 1}
  }
</style>
</head>
<body>

<div class="slideshow-container">

  <div class="slide fade">
    <img src="Images/MASCOT_1.png" alt="Courageous Mink on Monday" style="width:100%">
  </div>

  <div class="slide fade">
    <img src="Images/MASCOT_2.png" alt="Courageous Mink on Tuesday" style="width:100%">
  </div>

  <div class="slide fade">
    <img src="Images/MASCOT_3.png" alt="Courageous Mink on Wednesday" style="width:100%">
  </div>

  <div class="slide fade">
    <img src="Images/MASCOT_4.png" alt="Courageous Mink on Thursday" style="width:100%">
  </div>

  <div class="slide fade">
    <img src="Images/MASCOT_5.png" alt="Courageous Mink on Friday" style="width:100%">
  </div>

  <div class="slide fade">
    <img src="Images/MASCOT_Final.png" alt="Courageous Mink on Saturday 🤯🤯🤯" style="width: 50%; display:block; margin-left:auto; margin-right:auto;">

  </div>

  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>

</div>

<script>
  let slideIndex = 1;
  showSlides(slideIndex);

  // Next/previous controls
  function plusSlides(n) {
    showSlides(slideIndex += n);
  }

  // Function to handle showing the correct slide
  function showSlides(n) {
    let i;
    let slides = document.getElementsByClassName("slide");
    
    // Loop back to the first slide if we hit "next" on the last one
    if (n > slides.length) {slideIndex = 1} 
    
    // Loop to the last slide if we hit "prev" on the first one
    if (n < 1) {slideIndex = slides.length}
    
    // Hide all slides
    for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";  
    }
    
    // Show the current slide
    slides[slideIndex - 1].style.display = "block";  
  }
</script>

</body>
</html>
